<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Core - Premium Downloader</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030303;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
      color: #fff;
    }

    .app {
      width: 100%;
      max-width: 460px;
      min-height: 500px;
      background: #09090b;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      padding-bottom: 2.5rem;
      border: 1px solid rgba(254, 44, 85, 0.15);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(254, 44, 85, 0.05);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app:hover {
      border-color: rgba(254, 44, 85, 0.3);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 60px rgba(254, 44, 85, 0.1);
    }

    .noise {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .glow {
      position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
      width: 440px; height: 340px;
      background: radial-gradient(ellipse, rgba(254, 44, 85, 0.2) 0%, transparent 75%);
      pointer-events: none; z-index: 0;
    }

    .content { position: relative; z-index: 1; }

    /* Premium Header Design */
    .header {
      padding: 3rem 2.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .logo-icon {
      width: 54px; height: 54px; border-radius: 16px;
      background: linear-gradient(135deg, #fe2c55, #25f4ee);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(254, 44, 85, 0.2);
      position: relative;
    }

    .logo-icon i { font-size: 26px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

    .header-text h1 {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-text p { font-size: 13px; color: #71717a; font-weight: 500; margin-top: 3px; }

    /* Workspace Form */
    .main-form { padding: 2.5rem 2.5rem 1.5rem; }
    .url-label { font-size: 11px; font-weight: 700; color: #fe2c55; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; display: block; }
    .input-row { display: flex; gap: 12px; }

    .url-input {
      flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px; padding: 16px 20px; font-size: 14.5px; color: #fff;
      font-family: inherit; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .url-input::placeholder { color: #3f3f46; }
    .url-input:focus {
      background: rgba(254, 44, 85, 0.02);
      border-color: rgba(254, 44, 85, 0.6);
      box-shadow: 0 0 20px rgba(254, 44, 85, 0.15);
    }

    .paste-btn {
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px; padding: 0 20px; color: #e4e4e7;
      font-size: 15px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s ease;
    }
    .paste-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .fetch-btn {
      width: 100%; margin-top: 16px; padding: 16px; border: none; border-radius: 16px;
      color: white; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #fe2c55, #bd1c3c);
      box-shadow: 0 6px 20px rgba(254, 44, 85, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fetch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(254, 44, 85, 0.4);
      filter: brightness(1.1);
    }
    .fetch-btn:active { transform: translateY(0); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Glow Status Box */
    .status-msg { margin: 0 2.5rem 1.5rem; padding: 14px 20px; border-radius: 16px; font-size: 13.5px; display: none; line-height: 1.4; font-weight: 500; }
    .status-msg.visible { display: block; animation: slideDown 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .status-msg.error { background: rgba(254, 44, 85, 0.08); color: #fe2c55; border: 1px solid rgba(254, 44, 85, 0.2); box-shadow: 0 4px 15px rgba(254, 44, 85, 0.05); }
    .status-msg.success { background: rgba(37, 244, 238, 0.06); color: #25f4ee; border: 1px solid rgba(37, 244, 238, 0.2); box-shadow: 0 4px 15px rgba(37, 244, 238, 0.05); }
    .status-msg.info { background: rgba(255, 255, 255, 0.03); color: #a1a1aa; border: 1px solid rgba(255, 255, 255, 0.08); }

    /* Glassmorphism Output Box */
    .preview-card {
      background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(254, 44, 85, 0.15);
      border-radius: 24px; overflow: hidden; display: none; margin: 0 2.5rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }
    .preview-card.visible { display: block; animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .preview-top { display: flex; gap: 18px; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); background: rgba(0,0,0,0.15); }
    .thumb-wrap { width: 88px; height: 88px; border-radius: 14px; background: #18181b; flex-shrink: 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .preview-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .preview-title { font-size: 14.5px; font-weight: 600; color: #fff; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .preview-author { font-size: 12.5px; color: #fe2c55; margin-top: 6px; display: flex; align-items: center; gap: 5px; font-weight: 600; }

    .action-box { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.25); }
    .styled-select {
      width: 100%; background: #111113; border: 1px solid rgba(254, 44, 85, 0.2);
      border-radius: 14px; padding: 14px; color: white; font-size: 14px; outline: none;
      cursor: pointer; font-family: inherit; transition: all 0.3s;
      font-weight: 500;
    }
    .styled-select:focus { border-color: #fe2c55; box-shadow: 0 0 15px rgba(254, 44, 85, 0.1); }

    .dl-btn {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      font-family: 'Syne', sans-serif; font-size: 14.5px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      color: white; background: linear-gradient(135deg, #fe2c55, #bd1c3c);
      box-shadow: 0 4px 15px rgba(254, 44, 85, 0.2);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dl-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(254, 44, 85, 0.35);
    }
    .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { margin-top: 40px; font-size: 12px; color: #3f3f46; letter-spacing: 0.05em; text-align: center; font-weight: 500; }
    footer span { font-weight: 700; color: #fe2c55; }
  </style>
</head>
<body>

<div class="app">
  <div class="noise"></div>
  <div class="glow"></div>
  <div class="content">

    <div class="header">
      <div class="logo-icon">
        <i class="ti ti-brand-tiktok"></i>
      </div>
      <div class="header-text">
        <h1>TikTok Core</h1>
        <p>Unduh Video No-WM & Track Audio MP3</p>
      </div>
    </div>

    <div class="main-form">
      <div class="url-label">Tautan Konten TikTok</div>
      <div class="input-row">
        <input type="text" class="url-input" id="urlInput" placeholder="Tempel link video TikTok di sini..." />
        <button class="paste-btn" id="pasteBtn"><i class="ti ti-clipboard"></i></button>
      </div>
      <button class="fetch-btn" id="fetchBtn">Download Video</button>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div class="preview-card" id="previewCard">
      <div class="preview-top">
        <div class="thumb-wrap" id="thumbWrap"></div>
        <div class="preview-info">
          <div class="preview-title" id="previewTitle">—</div>
          <div class="preview-author" id="previewAuthor">—</div>
        </div>
      </div>

      <div class="action-box">
        <div style="margin-bottom: 2px;">
          <select class="styled-select" id="downloadFormat">
            <option value="mp4" selected>Video Kualitas Asli (MP4 - No WM)</option>
            <option value="mp3">Berkas Audio Saja (MP3)</option>
          </select>
        </div>
        <button class="dl-btn" id="dlBtn">Simpan Berkas Ke Folder Unduhan</button>
      </div>
    </div>

  </div>
</div>

<footer>Dibuat oleh<span> Shi :D</span></footer>

<script>
const urlInput = document.getElementById('urlInput');
const fetchBtn = document.getElementById('fetchBtn');
const pasteBtn = document.getElementById('pasteBtn');
const statusMsg = document.getElementById('statusMsg');
const previewCard = document.getElementById('previewCard');
const thumbWrap = document.getElementById('thumbWrap');
const previewTitle = document.getElementById('previewTitle');
const previewAuthor = document.getElementById('previewAuthor');
const downloadFormat = document.getElementById('downloadFormat');
const dlBtn = document.getElementById('dlBtn');

let activeMediaData = null;

function cleanUrl(url) {
  try {
    const urlObj = new URL(url);
    urlObj.search = ''; // Potong parameter tracker sampah bawaan mobile share
    return urlObj.toString();
  } catch(e) {
    return url;
  }
}

function showStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = `status-msg visible ${type}`;
  if (type === 'success') setTimeout(() => { statusMsg.className = 'status-msg'; }, 6000);
}

pasteBtn.addEventListener('click', async () => {
  try {
    urlInput.value = await navigator.clipboard.readText();
    urlInput.focus();
  } catch {
    urlInput.focus();
    showStatus('Gagal membaca clipboard. Silakan tempel tautan secara manual.', 'info');
  }
});

fetchBtn.addEventListener('click', async () => {
  let url = urlInput.value.trim();
  if(!url) { showStatus('Masukkan tautan video TikTok terlebih dahulu!', 'error'); return; }

  url = cleanUrl(url);

  fetchBtn.disabled = true;
  fetchBtn.innerHTML = '<span class="spinner"></span> Menghubungkan ke Core Server...';
  previewCard.classList.remove('visible');
  statusMsg.className = 'status-msg';

  try {
    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
    const res = await response.json();

    if(res.code === 0 && res.data) {
      const data = res.data;
      activeMediaData = {
        title: data.title || 'TikTok Video File',
        author: data.author.unique_id ? `@${data.author.unique_id}` : '@anonim',
        cover: data.cover,
        videoUrl: data.play,
        audioUrl: data.music
      };

      previewTitle.textContent = activeMediaData.title;
      previewAuthor.innerHTML = `<i class="ti ti-user-check"></i> ${activeMediaData.author}`;
      thumbWrap.innerHTML = `<img src="${activeMediaData.cover}" alt="Thumbnail">`;

      previewCard.classList.add('visible');
      showStatus('✓ Jalur repositori video berhasil dikunci!', 'success');
    } else {
      showStatus('Gagal mengekstrak video. Pastikan link benar dan video tidak di-private.', 'error');
    }
  } catch {
    showStatus('Terjadi kendala sinkronisasi jaringan atau API sedang limit.', 'error');
  } finally {
    fetchBtn.disabled = false;
    fetchBtn.innerHTML = 'Ekstrak Sumber Video';
  }
});

async function triggerDownload(url, filename) {
  dlBtn.disabled = true;
  dlBtn.innerHTML = '<span class="spinner"></span> Menulis Berkas...';
  showStatus('Memilah data stream berkas ke memori lokal...', 'info');

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error();

    const blob = await response.blob();
    const bUrl = window.URL.createObjectURL(blob);

    // Memicu paksa download langsung ke folder Downloads default OS lokal
    const a = document.createElement('a');
    a.href = bUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    window.URL.revokeObjectURL(bUrl);
    showStatus('✓ Berkas sukses tersimpan penuh di folder download perangkat!', 'success');
  } catch {
    showStatus('CORS Terproteksi. Membuka media di tab baru, silakan Klik Kanan -> Simpan Berkas.', 'error');
    window.open(url, '_blank');
  } finally {
    dlBtn.disabled = false;
    dlBtn.innerHTML = 'Simpan Berkas Ke Folder Unduhan';
  }
}

dlBtn.addEventListener('click', () => {
  if(!activeMediaData) return;

  // Bersihkan karakter aneh pada judul file
  const cleanTitle = activeMediaData.title.replace(/[^\w\s]/gi, '').substring(0, 18).trim() || 'tiktok_content';
  const format = downloadFormat.value;
  const targetUrl = format === 'mp4' ? activeMediaData.videoUrl : activeMediaData.audioUrl;
  const filename = `${cleanTitle}.${format}`;

  triggerDownload(targetUrl, filename);
});

urlInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') fetchBtn.click(); });
</script>
</body>
</html>
