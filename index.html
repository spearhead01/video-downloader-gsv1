<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Downloader - No Watermark</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px 20px 40px;
    }

    .app {
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      max-width: 480px;
      min-height: 560px;
      background: #0a0a0a;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      padding: 0 0 2rem;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .noise {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .glow {
      position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
      width: 400px; height: 300px;
      background: radial-gradient(ellipse, rgba(254,44,85,0.18) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .content { position: relative; z-index: 1; }

    .header {
      padding: 2rem 2rem 1.5rem;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #fe2c55, #25f4ee);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 24px; height: 24px; fill: white; }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 800; color: #fff;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 12px; color: rgba(255,255,255,0.4);
      font-weight: 300; margin-top: 1px;
    }

    .badge {
      margin-left: auto;
      background: rgba(254,44,85,0.15);
      color: #fe2c55;
      border: 0.5px solid rgba(254,44,85,0.3);
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
    }

    .main { padding: 2rem; }

    .url-label {
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex; gap: 10px; align-items: stretch;
    }

    .url-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px; color: #fff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .url-input::placeholder { color: rgba(255,255,255,0.25); }

    .url-input:focus {
      border-color: rgba(254,44,85,0.5);
      background: rgba(254,44,85,0.04);
    }

    .paste-btn {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0 16px;
      color: rgba(255,255,255,0.6);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 6px;
    }

    .paste-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .fetch-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: linear-gradient(135deg, #fe2c55, #e8174a);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px; font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .fetch-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.5rem 0;
    }

    .divider-line { flex: 1; height: 0.5px; background: rgba(255,255,255,0.08); }
    .divider-text { font-size: 12px; color: rgba(255,255,255,0.25); }

    .preview-card {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }

    .preview-card.visible { display: block; }

    .preview-top {
      display: flex; gap: 14px;
      padding: 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
    }

    .thumb-wrap {
      width: 72px; height: 90px; border-radius: 8px;
      background: #111;
      flex-shrink: 0; overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .thumb-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .preview-info { flex: 1; min-width: 0; }

    .preview-title {
      font-size: 14px; font-weight: 500; color: #fff;
      line-height: 1.4; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .preview-meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 8px;
    }

    .meta-chip {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.05);
      padding: 3px 8px; border-radius: 6px;
    }

    .action-row {
      display: flex; gap: 8px;
      padding: 16px;
    }

    .dl-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none;
    }

    .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; filter: none !important; }

    .dl-video { background: #fe2c55; color: white; }
    .dl-video:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .dl-audio {
      background: rgba(37,244,238,0.12);
      color: #25f4ee;
      border: 0.5px solid rgba(37,244,238,0.3) !important;
    }
    .dl-audio:hover { background: rgba(37,244,238,0.2); }

    .history-section { padding: 0 2rem; }

    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .clear-btn {
      font-size: 11px; color: rgba(255,255,255,0.3);
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: #fe2c55; }

    .history-empty { text-align: center; padding: 2rem 0; color: rgba(255,255,255,0.2); font-size: 13px; }

    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 0.5px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      margin-bottom: 6px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hist-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(254,44,85,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .hist-info { flex: 1; min-width: 0; }
    .hist-title { font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-meta { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .hist-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
    .badge-video { background: rgba(254,44,85,0.15); color: #fe2c55; }
    .badge-audio { background: rgba(37,244,238,0.12); color: #25f4ee; }

    .status-msg { margin: 0 2rem 1rem; padding: 10px 14px; border-radius: 10px; font-size: 13px; display: none; }
    .status-msg.visible { display: block; }
    .status-msg.error { background: rgba(254,44,85,0.1); color: #fe2c55; border: 0.5px solid rgba(254,44,85,0.2); }
    .status-msg.success { background: rgba(37,244,238,0.08); color: #25f4ee; border: 0.5px solid rgba(37,244,238,0.2); }
    .status-msg.info { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border: 0.5px solid rgba(255,255,255,0.1); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Gaya Desain Footer */
    footer {
      margin-top: 25px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
      text-align: center;
    }

    footer span {
      color: #fe2c55;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="noise"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34l-.01-8.83A8.18 8.18 0 0021 8.72V5.3a4.85 4.85 0 01-1.41 1.39z"/></svg>
      </div>
      <div class="header-text">
        <h1>TikTok Downloader</h1>
        <p>Unduh video tanpa watermark</p>
      </div>
      <span class="badge">Live</span>
    </div>

    <div class="main">
      <div class="url-label">URL Video TikTok</div>
      <div class="input-row">
        <input type="text" class="url-input" id="urlInput" placeholder="https://www.tiktok.com/@user/video/..." />
        <button class="paste-btn" id="pasteBtn">
          <i class="ti ti-clipboard"></i> Tempel
        </button>
      </div>
      <button class="fetch-btn" id="fetchBtn">
        <i class="ti ti-search"></i> Ambil Info Video
      </button>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div style="padding: 0 2rem 1rem;" id="previewWrap">
      <div class="preview-card" id="previewCard">
        <div class="preview-top">
          <div class="thumb-wrap" id="thumbWrap"></div>
          <div class="preview-info">
            <div class="preview-title" id="previewTitle">Memuat info video...</div>
            <div class="preview-meta">
              <span class="meta-chip" id="authorChip"><i class="ti ti-user" style="font-size:12px"></i> <span id="authorName">—</span></span>
              <span class="meta-chip" id="likeChip"><i class="ti ti-heart" style="font-size:12px"></i> <span id="likeText">—</span></span>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="dl-btn dl-video" id="dlVideoBtn">
            <i class="ti ti-download"></i> Video (No WM)
          </button>
          <button class="dl-btn dl-audio" id="dlAudioBtn">
            <i class="ti ti-music"></i> Audio MP3
          </button>
        </div>
      </div>
    </div>

    <div class="divider" style="margin: 0 2rem 1.5rem;">
      <div class="divider-line"></div>
      <span class="divider-text">Riwayat Unduhan</span>
      <div class="divider-line"></div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <span class="history-title">Terakhir Diunduh</span>
        <button class="clear-btn" id="clearBtn">Hapus Semua</button>
      </div>
      <div id="historyList">
        <div class="history-empty" id="emptyMsg">Belum ada unduhan</div>
      </div>
    </div>
  </div>
</div>

<footer>Dibuat oleh <span>Mrs.X (Lihat aja ig shizuka)</span></footer>

<script>
const urlInput = document.getElementById('urlInput');
const fetchBtn = document.getElementById('fetchBtn');
const pasteBtn = document.getElementById('pasteBtn');
const previewCard = document.getElementById('previewCard');
const statusMsg = document.getElementById('statusMsg');
const dlVideoBtn = document.getElementById('dlVideoBtn');
const dlAudioBtn = document.getElementById('dlAudioBtn');
const clearBtn = document.getElementById('clearBtn');
const historyList = document.getElementById('historyList');
const thumbWrap = document.getElementById('thumbWrap');

let currentVideoData = null;
let downloadHistory = JSON.parse(localStorage.getItem('dl_history')) || [];

function showStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = `status-msg visible ${type}`;
  if (type === 'success') setTimeout(() => { statusMsg.className = 'status-msg'; }, 5000);
}

function isValidTikTokUrl(url) {
  return url.includes('tiktok.com');
}

pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    urlInput.value = text;
    urlInput.focus();
  } catch {
    urlInput.focus();
    showStatus('Gagal menempel otomatis. Silakan tempel manual.', 'info');
  }
});

fetchBtn.addEventListener('click', async () => {
  const url = urlInput.value.trim();
  if (!url) { showStatus('Masukkan URL video TikTok terlebih dahulu', 'error'); return; }
  if (!isValidTikTokUrl(url)) { showStatus('URL tidak valid! Pastikan link dari TikTok.', 'error'); return; }

  fetchBtn.disabled = true;
  fetchBtn.innerHTML = '<span class="spinner"></span> Mengambil data...';
  statusMsg.className = 'status-msg';
  previewCard.classList.remove('visible');

  try {
    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
    const resData = await response.json();

    if (resData.code === 0 && resData.data) {
      const video = resData.data;
      currentVideoData = {
        title: video.title || "Video TikTok",
        author: video.author.unique_id ? `@${video.author.unique_id}` : "@anonim",
        cover: video.cover,
        videoUrl: video.play,
        audioUrl: video.music,
        likes: video.digg_count
      };

      document.getElementById('previewTitle').textContent = currentVideoData.title;
      document.getElementById('authorName').textContent = currentVideoData.author;
      document.getElementById('likeText').textContent = Number(currentVideoData.likes).toLocaleString('id-ID');
      thumbWrap.innerHTML = `<img src="${currentVideoData.cover}" alt="Cover">`;

      previewCard.classList.add('visible');
      showStatus('✓ Berhasil memuat info video!', 'success');
    } else {
      showStatus('Gagal mengambil info video. Pastikan video tidak di-private.', 'error');
    }
  } catch (err) {
    console.error(err);
    showStatus('Terjadi kesalahan jaringan atau API sedang limit.', 'error');
  } finally {
    fetchBtn.disabled = false;
    fetchBtn.innerHTML = '<i class="ti ti-search"></i> Ambil Info Video';
  }
});

// Perbaikan Utama: Membaca file berkas sebagai Blob agar tersimpan otomatis di perangkat lokal
async function triggerDownload(url, filename, btnElement, defaultBtnHtml) {
  btnElement.disabled = true;
  btnElement.innerHTML = '<span class="spinner"></span> Mengunduh...';
  showStatus('Sedang mengonversi dan mengunduh berkas langsung ke perangkat...', 'info');

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error('Gagal mengunduh file berkas.');

    const blob = await response.blob();
    const blobUrl = window.URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();

    // Bersihkan memori blob setelah diunduh
    document.body.removeChild(a);
    window.URL.revokeObjectURL(blobUrl);

    showStatus('✓ Berhasil disimpan di folder perangkat kamu!', 'success');
  } catch (error) {
    console.error(error);
    showStatus('Gagal mengunduh file berkas langsung. Mengalihkan jalur alternatif...', 'error');
    // Jalur cadangan jika fetch blob diblokir CORS parah
    window.open(url, '_blank');
  } finally {
    btnElement.disabled = false;
    btnElement.innerHTML = defaultBtnHtml;
  }
}

dlVideoBtn.addEventListener('click', () => {
  if (!currentVideoData) return;
  const cleanTitle = currentVideoData.title.replace(/[^\w\s]/gi, '').substring(0, 20).trim() || 'tiktok-video';
  const filename = `${cleanTitle}-nowm.mp4`;

  triggerDownload(
    currentVideoData.videoUrl,
    filename,
    dlVideoBtn,
    '<i class="ti ti-download"></i> Video (No WM)'
  );
  addToHistory('video', 'No WM');
});

dlAudioBtn.addEventListener('click', () => {
  if (!currentVideoData) return;
  const cleanTitle = currentVideoData.title.replace(/[^\w\s]/gi, '').substring(0, 20).trim() || 'tiktok-audio';
  const filename = `${cleanTitle}.mp3`;

  triggerDownload(
    currentVideoData.audioUrl,
    filename,
    dlAudioBtn,
    '<i class="ti ti-music"></i> Audio MP3'
  );
  addToHistory('audio', 'MP3');
});

function addToHistory(type, quality) {
  if (!currentVideoData) return;
  const item = {
    title: currentVideoData.title,
    author: currentVideoData.author,
    type,
    quality,
    time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
  };
  downloadHistory.unshift(item);
  if (downloadHistory.length > 5) downloadHistory.pop();
  localStorage.setItem('dl_history', JSON.stringify(downloadHistory));
  renderHistory();
}

function renderHistory() {
  if (downloadHistory.length === 0) {
    historyList.innerHTML = '<div class="history-empty">Belum ada unduhan</div>';
    return;
  }
  historyList.innerHTML = downloadHistory.map(item => `
    <div class="history-item">
      <div class="hist-icon">
        <i class="ti ti-${item.type === 'video' ? 'video' : 'music'}" style="color:#fe2c55; font-size:15px"></i>
      </div>
      <div class="hist-info">
        <div class="hist-title">${item.title}</div>
        <div class="hist-meta">${item.author} · ${item.time}</div>
      </div>
      <span class="hist-badge ${item.type === 'video' ? 'badge-video' : 'badge-audio'}">${item.quality}</span>
    </div>
  `).join('');
}

clearBtn.addEventListener('click', () => {
  downloadHistory = [];
  localStorage.removeItem('dl_history');
  renderHistory();
});

urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchBtn.click(); });

renderHistory();
</script>
</body>
</html>
